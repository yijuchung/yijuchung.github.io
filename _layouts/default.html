<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="dark">
  <head>
    <script>
      (() => {
        const param = new URLSearchParams(window.location.search).get("scoutTheme");
        const theme =
          param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <script>
      document.documentElement.setAttribute("data-theme", "dark");
    </script>
    <meta charset="utf-8">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <title>{{ page.title | default: site.title | escape }}</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="site-shell header-inner">
        <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="Yi-Ju Chung, home">
          <span class="wordmark-mark" aria-hidden="true">YJ</span>
          <span>Yi-Ju Chung</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/#services' | relative_url }}">Services</a>
          <a href="{{ '/#activity' | relative_url }}">Activity</a>
          <a href="{{ '/#approach' | relative_url }}">Approach</a>
          <a href="{{ '/#support' | relative_url }}">Support</a>
          <a href="https://www.linkedin.com/in/yjcgators/" rel="me noopener noreferrer">LinkedIn</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="site-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-shell footer-inner">
        <p>&copy; {{ "now" | date: "%Y" }} Yi-Ju Chung</p>
        {% if site.data.metrics.generated_at %}
          <p>Private metrics synced {{ site.data.metrics.generated_at | date: "%B %-d, %Y" }}</p>
        {% endif %}
      </div>
    </footer>
  </body>
</html>
